<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Simplified icon for small sizes (tab bar, etc.) -->

    <!-- Gradient definition -->
    <defs>
        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Main circle -->
    <circle cx="256" cy="256" r="200" fill="url(#blueGradient)" />

    <!-- Inner accent circle -->
    <circle cx="256" cy="256" r="140" fill="#DBEAFE" opacity="0.3" />

    <!-- Center viewfinder circle -->
    <circle cx="256" cy="256" r="80" fill="none" stroke="#FAF9F6" stroke-width="12" />

    <!-- Center focus point -->
    <circle cx="256" cy="256" r="16" fill="#FAF9F6" />
</svg>